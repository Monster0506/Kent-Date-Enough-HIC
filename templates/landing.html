{% extends "base.html" %}

{% block title %}Kent Date Enough{% endblock %}

{% block content %}
{% include '_bolt_bg.html' %}
<div class="relative z-10 flex w-screen h-screen overflow-hidden">

    <div class="flex-1 flex flex-col justify-center pl-[6%] pr-[4%]">
        <h1 class="flex flex-col font-jura font-bold text-[clamp(2.8rem,6vw,5.5rem)] leading-[1.05] text-brand-gold">

            <span>Enough</span>

            <a href="/login"  class="inline-block py-[0.65rem] px-[1.8rem] rounded font-bold text-base no-underline cursor-pointer border-2 border-brand-yellow bg-brand-yellow  text-brand-blue  hover:opacity-85 transition-opacity duration-150">Log In</a>
